<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="勉強プランナー">
<meta name="theme-color" content="#f0f4ff">
<title>勉強プランナー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;background:#f0f4ff;color:#1a1a2e;min-height:100dvh;overscroll-behavior:none}

.header{background:#fff;padding:calc(env(safe-area-inset-top,0px) + 16px) 16px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.app-name{font-size:13px;font-weight:700;color:#888;letter-spacing:.05em}
.today-badge{font-size:12px;font-weight:700;background:#4f46e5;color:#fff;padding:4px 12px;border-radius:20px}
.date-row{font-size:32px;font-weight:900;color:#1a1a2e;line-height:1.1}
.date-row .dow{font-size:16px;font-weight:600;color:#888;margin-left:8px}
.nav-row{display:flex;gap:8px;margin-top:12px}
.btn{flex:1;padding:11px 0;background:#f0f4ff;border:none;color:#1a1a2e;border-radius:12px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer}
.btn-today{flex:.8;background:#4f46e5;color:#fff}
.prog{margin-top:12px}
.prog-top{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:5px;font-weight:600}
.prog-bar{height:6px;background:#e8ecff;border-radius:6px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#4f46e5,#7c3aed);border-radius:6px;transition:width .4s}

.body{padding:14px 14px 80px}
.sec-label{font-size:12px;font-weight:700;color:#888;letter-spacing:.08em;margin:16px 0 8px 2px;text-transform:uppercase}
.sec-label:first-child{margin-top:0}

.card{background:#fff;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,0.06);border-left:5px solid #e8ecff;display:flex;align-items:flex-start;gap:12px;transition:opacity .2s}
.card.done{opacity:.4}
.card-icon{font-size:22px;line-height:1;flex-shrink:0;margin-top:1px}
.card-content{flex:1;min-width:0}
.card-tag{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:6px;letter-spacing:.03em}
.card-title{font-size:15px;font-weight:700;color:#1a1a2e;line-height:1.45;word-break:break-all}
.card.done .card-title{text-decoration:line-through;color:#aaa}
.card-sub{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap;align-items:center}
.pill{font-size:11px;background:#f0f4ff;color:#666;padding:3px 10px;border-radius:20px;font-weight:500}
.card-note{font-size:12px;font-weight:700;color:#059669}
.check{width:32px;height:32px;border-radius:50%;border:2.5px solid #d1d5f0;background:transparent;color:transparent;font-size:15px;font-weight:700;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;-webkit-appearance:none;margin-top:1px}
.check.done{background:#059669;border-color:#059669;color:#fff}

.summary{background:#fff;border-radius:16px;padding:14px 16px;margin-top:12px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 6px rgba(0,0,0,0.06)}
.sum-label{font-size:14px;color:#888;font-weight:600}
.sum-count{font-size:26px;font-weight:900;color:#1a1a2e}
.sum-count span{font-size:14px;font-weight:500;color:#888}

.empty{text-align:center;padding:60px 20px;color:#bbb}
.empty-icon{font-size:52px;margin-bottom:12px}
.empty p{font-size:16px;font-weight:600}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="app-name">📚 勉強プランナー</div>
    <div class="today-badge" id="todayBadge" style="display:none">TODAY</div>
  </div>
  <div class="date-row" id="dateRow"></div>
  <div class="nav-row">
    <button class="btn" onclick="move(-1)">◀ 前の日</button>
    <button class="btn btn-today" onclick="goToday()">今日</button>
    <button class="btn" onclick="move(1)">次の日 ▶</button>
  </div>
  <div class="prog" id="prog" style="display:none">
    <div class="prog-top"><span>今日の完了率</span><span id="progPct" style="color:#4f46e5">0%</span></div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>
</div>
<div class="body" id="body"></div>

const TC={
  kadai:    {icon:"🏫",label:"春休み課題",   color:"#be185d",bg:"#fce7f3",border:"#f9a8d4"},
  study_math:{icon:"📐",label:"数学 新規学習", color:"#4f46e5",bg:"#e0e7ff",border:"#a5b4fc"},
  eibunpo:  {icon:"🇬🇧",label:"英文法",       color:"#0369a1",bg:"#e0f2fe",border:"#7dd3fc"},
  gendai:   {icon:"📝",label:"現代文",        color:"#065f46",bg:"#d1fae5",border:"#6ee7b7"},
  weekly_review:{icon:"🗓",label:"日曜復習",  color:"#92400e",bg:"#fef3c7",border:"#fcd34d"},
  review_next:  {icon:"🔁",label:"翌日復習",  color:"#78350f",bg:"#fffbeb",border:"#fde68a"},
  review_week:  {icon:"🔁",label:"1週間後復習",color:"#78350f",bg:"#fffbeb",border:"#fde68a"},
  review_month: {icon:"🔁",label:"1ヶ月後復習",color:"#7c2d12",bg:"#fff7ed",border:"#fdba74"},
};

const DOW=["日","月","火","水","木","金","土"];
let cur=new Date();
let checked={};
try{checked=JSON.parse(localStorage.getItem('sp_v2')||'{}');}catch(e){}

const dk=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const isToday=d=>dk(d)===dk(new Date());
const save=()=>{try{localStorage.setItem('sp_v2',JSON.stringify(checked));}catch(e){}}

function move(n){cur=new Date(cur);cur.setDate(cur.getDate()+n);render();}
function goToday(){cur=new Date();render();}

function render(){
  const key=dk(cur);
  const tasks=S[key]||[];
  const ch=checked[key]||{};
  const dow=DOW[cur.getDay()];

  document.getElementById('dateRow').innerHTML=
    `${cur.getMonth()+1}月${cur.getDate()}日<span class="dow">${dow}曜日</span>`;
  document.getElementById('todayBadge').style.display=isToday(cur)?'':'none';

  const doneCount=Object.values(ch).filter(Boolean).length;
  const pct=tasks.length>0?Math.round(doneCount/tasks.length*100):0;
  const pg=document.getElementById('prog');
  pg.style.display=tasks.length>0?'':'none';
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progFill').style.width=pct+'%';

  if(tasks.length===0){
    document.getElementById('body').innerHTML=
      '<div class="empty"><div class="empty-icon">🎉</div><p>この日はお休みです</p></div>';
    return;
  }

  const main=tasks.filter(t=>['kadai','study_math','eibunpo','gendai'].includes(t.type));
  const rev=tasks.filter(t=>['review_next','review_week','review_month','weekly_review'].includes(t.type));

  const card=(t,i)=>{
    const c=TC[t.type]||{icon:'📌',label:t.type,color:'#555',bg:'#f5f5f5',border:'#ddd'};
    const tid=t.type+'-'+i;
    const done=!!(ch[tid]);
    return `<div class="card ${done?'done':''}" style="border-left-color:${done?'#e0e0e0':c.border}">
      <div class="card-icon">${c.icon}</div>
      <div class="card-content">
        <div class="card-tag" style="background:${c.bg};color:${c.color}">${c.label}</div>
        <div class="card-title">${t.label}</div>
        <div class="card-sub">
          <span class="pill">${t.book}</span>
          <span class="pill">${t.probs}</span>
          ${t.note?`<span class="card-note">${t.note}</span>`:''}
        </div>
      </div>
      <button class="check ${done?'done':''}" onclick="toggle('${key}','${tid}')">✓</button>
    </div>`;
  };

  let html='';
  if(main.length){
    html+='<div class="sec-label">📌 今日のタスク</div>';
    main.forEach((t,i)=>html+=card(t,i));
  }
  if(rev.length){
    html+='<div class="sec-label">🔁 復習タスク</div>';
    rev.forEach((t,i)=>html+=card(t,main.length+i));
  }
  html+=`<div class="summary">
    <span class="sum-label">本日の完了</span>
    <span class="sum-count">${doneCount}<span> / ${tasks.length}</span></span>
  </div>`;
  document.getElementById('body').innerHTML=html;
}

function toggle(key,tid){
  if(!checked[key])checked[key]={};
  checked[key][tid]=!checked[key][tid];
  save();render();
}
